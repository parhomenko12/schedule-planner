<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        /* Дополнительные стили для красивых полей */
        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid var(--table-border);
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 1rem;
            box-sizing: border-box;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(123, 44, 191, 0.2);
        }
        label {
            font-weight: bold;
            margin-top: 10px;
            display: block;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
        }
    </style>
    <script>
        function applyTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') document.body.classList.add('dark');
            else document.body.classList.remove('dark');
        }
        function toggleTheme() {
            if (document.body.classList.contains('dark')) {
                document.body.classList.remove('dark');
                localStorage.setItem('theme', 'light');
            } else {
                document.body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }
        window.onload = applyTheme;
    </script>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">🌓</button>
    <div class="container" style="max-width: 500px;">
        <h1>📝 Регистрация</h1>
        <form method="post" action="/register">
            <input type="text" name="last_name" placeholder="Фамилия" required>
            <input type="text" name="first_name" placeholder="Имя" required>
            <input type="text" name="middle_name" placeholder="Отчество">
            
            <label>Выберите группу:</label>
            <select name="group_id" required>
                <option value="">-- Выберите группу --</option>
                {% for group in groups %}
                <option value="{{ group.id }}">{{ group.name }}</option>
                {% endfor %}
            </select>
            
            <input type="tel" name="phone" placeholder="Телефон (например, +79001234567)" required>
            <input type="email" name="email" placeholder="Email" required>
            <input type="password" name="password" placeholder="Пароль" required>
            <input type="password" name="confirm_password" placeholder="Подтвердите пароль" required>
            
            <button type="submit">Зарегистрироваться</button>
        </form>
        <p style="text-align: center; margin-top: 20px;">Уже есть аккаунт? <a href="/login">Войти</a></p>
        <p style="text-align: center;"><a href="/">На главную</a></p>
    </div>
</body>
</html>
